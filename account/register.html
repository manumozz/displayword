<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Регистрация — DisplayWord</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
  <link rel="shortcut icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../style.css" />
  <style>
    body { display: flex; flex-direction: column; min-height: 100vh; align-items: center; justify-content: center; padding: 24px; }
    .card { background: var(--navy2); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 40px 36px; width: 100%; max-width: 420px; }
    .logo { font-size: 1.1rem; font-weight: 800; color: var(--accent); text-decoration: none; display: block; margin-bottom: 28px; }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 8px; }
    .sub { font-size: 0.9rem; color: var(--gray); margin-bottom: 28px; }
    label { display: block; font-size: 0.85rem; font-weight: 600; color: var(--gray); margin-bottom: 6px; }
    .input-wrap { position: relative; margin-bottom: 18px; }
    input[type=email], input[type=password], input[type=text] {
      width: 100%; box-sizing: border-box;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px; padding: 11px 44px 11px 14px;
      color: var(--white); font-size: 0.95rem; font-family: inherit;
      outline: none; transition: border-color 0.2s;
    }
    input:focus { border-color: var(--accent); }
    .toggle-pw {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; color: var(--gray);
      padding: 4px; line-height: 1; font-size: 1rem;
      transition: color 0.2s;
    }
    .toggle-pw:hover { color: var(--white); }
    .btn { width: 100%; padding: 13px; background: var(--accent); color: #fff; border: none; border-radius: 9px; font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: opacity 0.2s; margin-top: 4px; font-family: inherit; }
    .btn:hover { opacity: 0.88; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .msg { font-size: 0.88rem; padding: 10px 14px; border-radius: 8px; margin-bottom: 16px; display: none; }
    .msg.error   { background: rgba(239,68,68,0.12); color: #f87171; border: 1px solid rgba(239,68,68,0.2); }
    .msg.success { background: rgba(74,222,128,0.1);  color: #4ade80; border: 1px solid rgba(74,222,128,0.2); }
    .footer-link { text-align: center; margin-top: 24px; font-size: 0.88rem; color: var(--gray); }
    .footer-link a { color: var(--accent); text-decoration: none; }
    .footer-link a:hover { text-decoration: underline; }
    .hint { font-size: 0.8rem; color: var(--gray); margin-top: -12px; margin-bottom: 18px; }
  </style>
</head>
<body>
  <div class="card">
    <a href="/" class="logo">DisplayWord</a>
    <h1>Регистрация</h1>
    <p class="sub">Создайте аккаунт чтобы подать заявку на ключ</p>

    <div class="msg" id="msg"></div>

    <form id="form" novalidate>
      <label for="email">Email</label>
      <div class="input-wrap">
        <input type="email" id="email" name="email" autocomplete="email" required placeholder="church@example.com" />
      </div>

      <label for="password">Пароль</label>
      <div class="input-wrap">
        <input type="password" id="password" name="password" autocomplete="new-password" required placeholder="Минимум 8 символов" />
        <button type="button" class="toggle-pw" onclick="togglePw('password', this)" title="Показать пароль">👁</button>
      </div>

      <label for="password2">Повторите пароль</label>
      <div class="input-wrap">
        <input type="password" id="password2" name="password2" autocomplete="new-password" required placeholder="Ещё раз" oninput="checkMatch()" />
        <button type="button" class="toggle-pw" onclick="togglePw('password2', this)" title="Показать пароль">👁</button>
        <span id="matchMark" style="display:none;position:absolute;right:40px;top:50%;transform:translateY(-50%);color:#4ade80;font-size:1rem;">✓</span>
      </div>

      <button type="submit" class="btn" id="btn">Создать аккаунт</button>
    </form>

    <div class="footer-link">Уже есть аккаунт? <a href="/account/login">Войти</a></div>
  </div>

  <script>
    const form = document.getElementById('form');
    const btn  = document.getElementById('btn');
    const msg  = document.getElementById('msg');

    function checkMatch() {
      const pw1 = document.getElementById('password').value;
      const pw2 = document.getElementById('password2').value;
      const mark = document.getElementById('matchMark');
      const inp2 = document.getElementById('password2');
      if (pw2.length > 0 && pw1 === pw2) {
        mark.style.display = 'block';
        inp2.style.borderColor = '#4ade80';
      } else {
        mark.style.display = 'none';
        inp2.style.borderColor = '';
      }
    }

    function togglePw(id, el) {
      const inp = document.getElementById(id);
      if (inp.type === 'password') { inp.type = 'text'; el.style.opacity = '1'; }
      else { inp.type = 'password'; el.style.opacity = '0.5'; }
    }

    function showMsg(text, type) {
      msg.textContent = text;
      msg.className = `msg ${type}`;
      msg.style.display = 'block';
    }

    form.addEventListener('submit', async e => {
      e.preventDefault();
      msg.style.display = 'none';

      const email = document.getElementById('email').value.trim();
      const pw1   = document.getElementById('password').value;
      const pw2   = document.getElementById('password2').value;

      if (!email) return showMsg('Введите email.', 'error');
      if (pw1.length < 8) return showMsg('Пароль — минимум 8 символов.', 'error');
      if (pw1 !== pw2)    return showMsg('Пароли не совпадают.', 'error');

      btn.disabled = true;
      btn.textContent = 'Создаём аккаунт…';

      try {
        const res  = await fetch('/api/v1/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password: pw1 }),
        });
        const data = await res.json();

        if (res.ok) {
          form.style.display = 'none';
          showMsg('Аккаунт создан! Проверьте почту для подтверждения email.', 'success');
        } else {
          showMsg(data.message || 'Ошибка регистрации', 'error');
          btn.disabled = false;
          btn.textContent = 'Создать аккаунт';
        }
      } catch {
        showMsg('Ошибка сети. Попробуйте ещё раз.', 'error');
        btn.disabled = false;
        btn.textContent = 'Создать аккаунт';
      }
    });
  </script>
</body>
</html>

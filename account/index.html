<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Кабинет — DisplayWord</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../style.css" />
  <style>
    .topbar { position: fixed; top: 0; left: 0; right: 0; height: 60px; background: rgba(15,27,45,0.97); border-bottom: 1px solid rgba(255,255,255,0.06); display: flex; align-items: center; justify-content: space-between; padding: 0 5%; z-index: 100; }
    .topbar-logo { font-size: 1rem; font-weight: 800; color: var(--accent); text-decoration: none; }
    .topbar-right { display: flex; align-items: center; gap: 16px; }
    .user-email { font-size: 0.85rem; color: var(--gray); }
    .btn-logout { background: none; border: 1px solid rgba(255,255,255,0.1); color: var(--gray); padding: 6px 14px; border-radius: 7px; font-size: 0.82rem; font-weight: 600; cursor: pointer; font-family: inherit; transition: all 0.2s; }
    .btn-logout:hover { border-color: rgba(255,255,255,0.2); color: var(--white); }
    main { padding: 100px 5% 60px; max-width: 860px; margin: 0 auto; }
    h1 { font-size: 1.8rem; font-weight: 800; margin-bottom: 8px; }
    .sub { color: var(--gray); margin-bottom: 40px; }
    .section-title { font-size: 0.78rem; font-weight: 700; color: var(--gray); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 16px; }
    .empty-card { background: var(--navy2); border: 1px dashed rgba(255,255,255,0.1); border-radius: 14px; padding: 40px; text-align: center; color: var(--gray); }
    .empty-card p { margin-bottom: 20px; font-size: 0.95rem; }
    .btn-primary { display: inline-block; background: var(--accent); color: #fff; padding: 11px 24px; border-radius: 9px; font-size: 0.92rem; font-weight: 700; text-decoration: none; transition: opacity 0.2s; border: none; cursor: pointer; font-family: inherit; }
    .btn-primary:hover { opacity: 0.88; }
    .key-card { background: var(--navy2); border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; padding: 24px 28px; margin-bottom: 14px; }
    .key-community { font-weight: 700; font-size: 1rem; margin-bottom: 6px; }
    .key-string { font-family: monospace; font-size: 0.78rem; color: var(--gray); word-break: break-all; background: rgba(0,0,0,0.2); padding: 8px 12px; border-radius: 6px; margin: 10px 0; }
    .key-meta { font-size: 0.82rem; color: var(--gray); }
    .badge-active { display: inline-block; background: rgba(74,222,128,0.12); color: var(--green); border: 1px solid rgba(74,222,128,0.2); padding: 2px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; }
    .app-card { background: var(--navy2); border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; padding: 20px 28px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
    .app-info { font-size: 0.9rem; }
    .app-info strong { display: block; margin-bottom: 4px; }
    .app-info span { color: var(--gray); font-size: 0.82rem; }
    .status-pending  { color: var(--gold); }
    .status-approved { color: var(--green); }
    .status-rejected { color: #f87171; }
    .section { margin-bottom: 48px; }
    .loader { color: var(--gray); font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="topbar">
    <a href="/" class="topbar-logo">DisplayWord</a>
    <div class="topbar-right">
      <span class="user-email" id="userEmail"></span>
      <button class="btn-logout" id="btnLogout">Выйти</button>
    </div>
  </div>

  <main>
    <h1>Личный кабинет</h1>
    <p class="sub" id="welcomeSub">Загрузка…</p>

    <div class="section">
      <div class="section-title">Лицензионные ключи</div>
      <div id="keysContainer" class="loader">Загрузка…</div>
    </div>

    <div class="section">
      <div class="section-title">Заявки</div>
      <div id="appsContainer" class="loader">Загрузка…</div>
    </div>
  </main>

  <script>
    const STATUS_LABELS = {
      pending:  '<span class="status-pending">На рассмотрении</span>',
      approved: '<span class="status-approved">Одобрена</span>',
      rejected: '<span class="status-rejected">Отклонена</span>',
    };

    async function load() {
      // Check auth
      const meRes = await fetch('/api/v1/me', { credentials: 'same-origin' });
      if (!meRes.ok) { window.location.href = '/account/login'; return; }
      const me = await meRes.json();

      document.getElementById('userEmail').textContent = me.email;
      document.getElementById('welcomeSub').textContent = 'Добро пожаловать, ' + me.email;

      if (me.isAdmin) {
        document.getElementById('welcomeSub').innerHTML +=
          ' · <a href="/admin/" style="color:var(--gold);text-decoration:none;font-weight:700">Перейти в админку →</a>';
      }

      // Keys
      const keysRes = await fetch('/api/v1/keys', { credentials: 'same-origin' });
      const keysEl  = document.getElementById('keysContainer');
      if (keysRes.ok) {
        const keys = await keysRes.json();
        if (keys.length === 0) {
          keysEl.innerHTML = `
            <div class="empty-card">
              <p>У вас ещё нет ключей. Подайте заявку — автор рассмотрит её и выдаст ключ.</p>
              <a href="/account/apply" class="btn-primary">Подать заявку</a>
            </div>`;
        } else {
          keysEl.innerHTML = keys.map(k => `
            <div class="key-card">
              <div class="key-community">${esc(k.community_name)} <span class="badge-active">Активен</span></div>
              <div class="key-string">${esc(k.key_string)}</div>
              <div class="key-meta">Выдан: ${fmt(k.issued_at)} · Режим: ${k.mode} · Активации: ${k.activations}/${k.activation_limit ?? '∞'}</div>
            </div>`).join('');
        }
      } else {
        keysEl.textContent = 'Ошибка загрузки ключей.';
      }

      // Applications
      const appsRes = await fetch('/api/v1/applications', { credentials: 'same-origin' });
      const appsEl  = document.getElementById('appsContainer');
      if (appsRes.ok) {
        const apps = await appsRes.json();
        if (apps.length === 0) {
          appsEl.innerHTML = `
            <div class="empty-card">
              <p>Заявок пока нет.</p>
              <a href="/account/apply" class="btn-primary">Подать первую заявку</a>
            </div>`;
        } else {
          appsEl.innerHTML = apps.map(a => `
            <div class="app-card">
              <div class="app-info">
                <strong>${esc(a.community_name)}</strong>
                <span>${esc(a.city_country)} · ${fmt(a.created_at)}</span>
              </div>
              <div>${STATUS_LABELS[a.status] || a.status}</div>
            </div>`).join('');
        }
      } else {
        appsEl.textContent = 'Ошибка загрузки заявок.';
      }
    }

    document.getElementById('btnLogout').addEventListener('click', async () => {
      await fetch('/api/v1/auth/logout', { method: 'POST', credentials: 'same-origin' });
      window.location.href = '/account/login';
    });

    function esc(s) {
      return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
    function fmt(iso) {
      if (!iso) return '—';
      return new Date(iso).toLocaleDateString('ru-RU', { day:'numeric', month:'long', year:'numeric' });
    }

    load();
  </script>
</body>
</html>
